name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set version from tag
        run: node -e "const p=require('./package.json');p.version='${GITHUB_REF_NAME}'.replace('v','');require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm pack

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: cockpit-*.tgz
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Surething-io/cockpit/main/install.sh | bash
            ```

            ## Update

            Already installed? Just run:

            ```bash
            cock update
            ```
